<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum</title>
    <link rel="shortcut icon" href="assets/img/icons/favicon/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/shared/general.css">
    <link rel="stylesheet" href="css/shared/header.css">
    <link rel="stylesheet" href="css/shared/button.css">
    <link rel="stylesheet" href="css/shared/page.css">
    <link rel="stylesheet" href="css/shared/text-input.css">
    <link rel="stylesheet" href="css/shared/filters.css">
    <link rel="stylesheet" href="css/shared/drop-down.css">
    <link rel="stylesheet" href="css/shared/post.css">
    <link rel="stylesheet" href="css/shared/tile-container.css">
    <link rel="stylesheet" href="css/shared/logo.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/img/icons/favicon/favicon.png" alt="logo">
            <span>Forum romanum</span>
        </div>
        <nav>
            <a href="index.html">
                <button class="button button--blue button--gray-active active border">Forum</button>
            </a>
            <a href="pages/categories.html">
                <button class="button button--blue button--gray-active">Categories</button>
            </a>
        </nav>
        <div class="right"></div>
    </header>
    <main>
        <div class="big">Forum</div>
        <div class="small">Discustion with comunity.</div>
        <div class="filters tile-container">
            <div class="search">
                <label>
                    <div class="search-icon">
                        <svg>
                            <use href="./assets/img/icons/icons.svg#search"></use>
                        </svg>
                    </div>
                    <input type="text" placeholder="Search posts...">
                </label>
            </div>
            <div class="author-search">
                <input type="text" placeholder="Author: username/email">
            </div>
            <div class="categories drop-down-input">
                <button class="text-input">
                    <span>All categories</span>
                    <svg>
                        <use href="./assets/img/icons/icons.svg#arrow_down"></use>
                    </svg>
                </button>
                <div class="options tile-container">
                    <button class="checked">
                        <span>All categories</span>
                        <svg>
                            <use href="./assets/img/icons/icons.svg#check"></use>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="sorting drop-down-input">
                <button class="text-input" data-option-id="1">
                    <span>Latest</span>
                    <svg>
                        <use href="./assets/img/icons/icons.svg#arrow_down"></use>
                    </svg>
                </button>
                <div class="options tile-container">
                    <button class="checked" data-option-id="1">
                        <span>Latest</span>
                        <svg>
                            <use href="./assets/img/icons/icons.svg#check"></use>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="posts">No posts yet</div>
    </main>
    <script src="scripts/pages/index.js" type="module"></script>
</body>
</html>
