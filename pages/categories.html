<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Categories</title>
    <link rel="shortcut icon" href="../assets/img/icons/favicon/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/pages/categories.css">
    <link rel="stylesheet" href="../css/shared/general.css">
    <link rel="stylesheet" href="../css/shared/header.css">
    <link rel="stylesheet" href="../css/shared/button.css">
    <link rel="stylesheet" href="../css/shared/page.css">
    <link rel="stylesheet" href="../css/shared/text-input.css">
    <link rel="stylesheet" href="../css/shared/tile-container.css">
    <link rel="stylesheet" href="../css/shared/logo.css">

</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/icons/favicon/favicon.png" alt="logo">
            <span>Forum romanum</span>
        </div>
        <nav>
            <a href="../index.html">
                <button class="button button--blue button--gray-active">Forum</button>
            </a>
            <a href="categories.html">
                <button class="button button--blue button--gray-active active border">Categories</button>
            </a>
        </nav>
        <div class="right"></div>
    </header>
    <main>
        <div class="back-button">
            <a href="../index.html">
                <button class="button button--back-button">
                    <svg>
                        <use href="../assets/img/icons/icons.svg#arrow_back"></use>
                    </svg>
                    <span>Forum</span>
                </button>
            </a>
        </div>
        <div class="big">Categories</div>
        <div class="js-subtitle small">Browse and change categories</div>
        <form class="js-add-category add-category tile-container">
            <input type="text" class="text-input" placeholder="New category name">
            <button class="button button--white-inverse border">
                <span>Add</span>
                <svg>
                    <use href="../assets/img/icons/icons.svg#add"></use>
                </svg>
            </button>
        </form>
        <div class="js-categories categories tile-container grid"></div>
    </main>
    <!-- <script src="../scripts/tests/categoryComponentTest.js" type="module"></script> -->
    <script src="../scripts/pages/categories.js" type="module"></script>
</body>
</html>
