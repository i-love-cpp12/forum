<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum - Sign in</title>
    <link rel="shortcut icon" href="../assets/img/icons/favicon/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/pages/categories.css">
    <link rel="stylesheet" href="../css/shared/general.css">
    <link rel="stylesheet" href="../css/shared/header.css">
    <link rel="stylesheet" href="../css/shared/button.css">
    <link rel="stylesheet" href="../css/shared/page.css">
    <link rel="stylesheet" href="../css/shared/text-input.css">
    <link rel="stylesheet" href="../css/shared/tile-container.css">
    <link rel="stylesheet" href="../css/shared/logo.css">
    <link rel="stylesheet" href="../css/shared/sign-user.css">
    <link rel="stylesheet" href="../css/shared/form.css">

</head>
<body>
    <header>
        <div class="logo">
            <img src="../assets/img/icons/favicon/favicon.png" alt="logo">
            <span>Forum romanum</span>
        </div>
        <nav>
            <a href="../index.html">
                <button class="button button--blue button--gray-active">Forum</button>
            </a>
            <a href="categories.html">
                <button class="button button--blue button--gray-active">Categories</button>
            </a>
        </nav>
        <div class="right">
            <div class="unlogged">
                <a href="../pages/login.html">
                    <button class="button border button--hover-fill-blue">Log in</button>
                </a>
                <a href="../pages/signup.html">
                    <button class="button border button--white-inverse">Sign up</button>
                </a>
            </div>
        </div>
    </header>
    <main>
        <div class="sign-user-tile">
            <div class="back-button">
                <a href="../index.html">
                    <button class="button button--back-button">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
                        <span>Forum</span>
                    </button>
                </a>
            </div>
            <div class="tile-container">
                <div class="logo">
                    <img src="../assets/img/icons/favicon/favicon.png" alt="logo">
                    <span>Forum romanum</span>
                </div>
                <div class="big">Create your account</div>
                <div class="small">Join the conversation in seconds.</div>
                <form class="form">
                    <div class="form-field">
                        <label>
                            <div>Username</div>
                            <input type="text" class="text-input" placeholder="Type your username">
                        </label>
                        <div class="error"></div>
                    </div>
                    <div class="form-field">
                        <label>
                            <div>Email</div>
                            <input type="email" class="text-input" placeholder="Type your email">
                        </label>
                        <div class="error"></div>
                    </div>
                    <div class="form-field">
                        <label>
                            <div class="filed-name">Password</div>
                            <input type="password" class="text-input error" placeholder="Type your password">
                        </label>
                        <div class="error">Password not valid</div>
                    </div>
                    <div>
                        <button type="submit" class="button button--white-inverse border">
                            Sign in
                        </button>
                    </div>
                    <div class="redirect">
                        <span>Already have an account? <a class="accent" href="login.html">Log in</a></span>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
